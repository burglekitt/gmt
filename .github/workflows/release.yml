name: Release

# When changesets are merged to main, this workflow opens (or updates)
# a "Version Packages" pull request that bumps versions and changelogs.
# It does NOT publish to npm automatically.
# Publishing is a manual step — use the publish.yml workflow_dispatch.

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Open Version PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-cache

      - name: Create or update Version Packages PR
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          title: "Version Packages"
          commit: "Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
