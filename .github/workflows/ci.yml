name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Install full ICU data (fallback if nodejs-fullicu is not available)
      - name: Install full ICU data
        run: |
          sudo apt-get update || true
          sudo apt-get install -y nodejs-fullicu || echo "nodejs-fullicu not found, falling back to default ICU"
          # Fallback: Use the system ICU data if nodejs-fullicu is not available
          echo "ICU data installed at: $(ls /usr/share/nodejs/node-fullicu/full-icu-data.json || echo '/usr/share/icu/72.1/')"

      # Install all dependencies (including devDependencies)
      - name: Install dependencies
        run: bun install --no-cache
        env:
          NODE_ICU_DATA: /usr/share/nodejs/node-fullicu/full-icu-data.json
          NODE_OPTIONS: "--icu-data-dir=/usr/share/nodejs/node-fullicu/full-icu-data.json"

      # Debug: Verify Nx modules are installed
      - name: Debug Nx modules
        run: |
          ls -la node_modules/@nrwl || echo "Nx modules not found in node_modules/@nrwl"
          ls -la node_modules/.bin/nx || echo "Nx binary not found in node_modules/.bin"

      # Sets NX_BASE and NX_HEAD for reliable affected calculations
      - uses: nrwl/nx-set-shas@v4

      # Pull requests: run only what changed
      - name: Run affected tasks
        run: bunx nx affected -t lint test typecheck build --base=$NX_BASE --head=$NX_HEAD
        if: github.event_name == 'pull_request'

      # Main branch: run the full monorepo checks
      - name: Run all tasks
        run: bunx nx run-many -t lint test typecheck build
        if: github.event_name == 'push'

      # Custom test scripts
      - name: Run gmt-oxlint tests
        run: bun run test:gmt-oxlint

      # Verify config packages are packagable
      - name: Verify gmt-biome pack
        run: cd packages/gmt-biome && npm pack --dry-run

      - name: Verify gmt-eslint pack
        run: cd packages/gmt-eslint && npm pack --dry-run

      - name: Verify gmt-oxlint pack
        run: cd packages/gmt-oxlint && npm pack --dry-run