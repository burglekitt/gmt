name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  determine-affected:
    name: Determine affected packages
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.detect.outputs.any_changed }}
      gmt_changed: ${{ steps.detect.outputs.gmt_changed }}
      non_gmt_changed: ${{ steps.detect.outputs.non_gmt_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v4

      - id: detect
        run: |
          CHANGED=$(git diff --name-only $NX_BASE $NX_HEAD)
          echo "changed files: $CHANGED"
          if echo "$CHANGED" | grep -q '^packages/gmt/'; then
            echo "gmt_changed=true" >> $GITHUB_OUTPUT
          else
            echo "gmt_changed=false" >> $GITHUB_OUTPUT
          fi
          NON_GMT=$(echo "$CHANGED" | grep -v '^packages/gmt/' | grep -v '^packages/gmt-oxlint/' || true)
          if [ -z "$NON_GMT" ]; then
            echo "non_gmt_changed=false" >> $GITHUB_OUTPUT
          else
            echo "non_gmt_changed=true" >> $GITHUB_OUTPUT
          fi
          if [ -z "$CHANGED" ]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi

  build-lint:
    name: Build & Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: determine-affected
    if: needs.determine-affected.outputs.any_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Approve pnpm build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean stale build artifacts
        run: |
          find . -name "*.tsbuildinfo" -delete 2>/dev/null || true
          rm -rf .nx/cache 2>/dev/null || true

      - uses: nrwl/nx-set-shas@v4

      - name: Run affected tasks
        run: pnpm -w exec nx affected -t lint typecheck build --base=$NX_BASE --head=$NX_HEAD

  tests:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: [determine-affected, build-lint]
    if: needs.determine-affected.outputs.non_gmt_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Approve pnpm build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Run affected tests
        run: pnpm -w exec nx affected -t test --base=$NX_BASE --head=$NX_HEAD --exclude=@burglekitt/gmt,@burglekitt/gmt-oxlint --plain

      - name: Collect test artifacts
        if: always()
        run: |
          mkdir -p artifact || true
          if [ -d packages ]; then
            find packages -maxdepth 2 -type d -name 'test-results' -exec cp -r {} artifact/ \; || true
            find packages -maxdepth 2 -type f -name 'vitest-junit.xml' -exec cp {} artifact/ \; || true
            find packages -maxdepth 2 -type d -name 'coverage' -exec cp -r {} artifact/ \; || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-${{ matrix.node-version }}
          path: artifact

  gmt-matrix:
    name: GMT TZ Tests — Node ${{ matrix.node-version }} / ${{ matrix.timezone }}
    runs-on: ubuntu-latest
    needs: determine-affected
    if: needs.determine-affected.outputs.gmt_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        timezone: ["UTC", "Pacific/Apia", "Pacific/Niue"]
    timeout-minutes: 120
    env:
      TZ: ${{ matrix.timezone }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-gmt-${{ matrix.node-version }}-${{ matrix.timezone }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-gmt-${{ matrix.node-version }}-
            ${{ runner.os }}-pnpm-store-

      - name: Approve pnpm build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GMT tests
        run: pnpm -w exec vitest run --config packages/gmt/vitest.config.ts

      - name: Collect GMT test artifacts
        if: always()
        run: |
          mkdir -p artifact || true
          if [ -d packages/gmt/test-results ]; then cp -r packages/gmt/test-results artifact/ || true; fi
          if [ -f packages/gmt/vitest-junit.xml ]; then cp packages/gmt/vitest-junit.xml artifact/ || true; fi
          if [ -d packages/gmt/coverage ]; then cp -r packages/gmt/coverage artifact/ || true; fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gmt-artifacts-${{ matrix.node-version }}-${{ matrix.timezone }}
          path: artifact