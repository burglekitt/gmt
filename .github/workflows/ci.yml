name: CI — Core

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - '.github/workflows/**'
      - 'nx.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/**'
      - 'nx.json'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  build-lint:
    name: CI — Build & Lint (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nx-cache-

      - name: Approve pnpm build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Run affected lint/typecheck/build (PR)
        if: github.event_name == 'pull_request'
        run: pnpm -w exec nx affected -t lint typecheck build --base=$NX_BASE --head=$NX_HEAD

      - name: Run all lint/typecheck/build (push)
        if: github.event_name == 'push'
        run: pnpm -w exec nx run-many -t lint typecheck build

      - name: Run gmt-oxlint tests (Node 24 only)
        continue-on-error: true
        run: pnpm run test:gmt-oxlint

      - name: Verify packable config packages (Node 24)
        run: |
          (cd packages/gmt-biome && npm pack --dry-run) || true
          (cd packages/gmt-eslint && npm pack --dry-run) || true
          (cd packages/gmt-oxlint && npm pack --dry-run) || true

  tests:
    name: CI — Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: build-lint
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-${{ matrix.node-version }}-
            ${{ runner.os }}-pnpm-store-

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-cache-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nx-cache-${{ matrix.node-version }}-
            ${{ runner.os }}-nx-cache-

      - name: Approve pnpm build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Run affected tests (PR)
        if: github.event_name == 'pull_request'
        run: pnpm -w exec nx affected -t test --base=$NX_BASE --head=$NX_HEAD --exclude=@burglekitt/gmt

      - name: Run all tests (push)
        if: github.event_name == 'push'
        run: pnpm -w exec nx run-many -t test --exclude=@burglekitt/gmt

      - name: Collect test artifacts
        if: always()
        run: |
          mkdir -p artifact || true
          if [ -d packages ]; then
            find packages -maxdepth 2 -type d -name 'test-results' -exec cp -r {} artifact/ \; || true
            find packages -maxdepth 2 -type f -name 'vitest-junit.xml' -exec cp {} artifact/ \; || true
            find packages -maxdepth 2 -type d -name 'coverage' -exec cp -r {} artifact/ \; || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-${{ matrix.node-version }}
          path: artifact
