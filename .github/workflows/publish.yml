name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - gmt
          - gmt-biome
          - gmt-eslint
          - gmt-oxlint
      tag:
        description: "npm dist-tag (e.g. latest, next, beta)"
        required: true
        default: "latest"

permissions:
  contents: read

jobs:
  publish:
    name: Publish @burglekitt/${{ inputs.package }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1+sha512.a706938f0e89ac1456b6563eab4edf1d1faf3368d1191fc5c59790e96dc918e4456ab2e67d613de1043d2e8c81f87303e6b40d4ffeca9df15ef1ad567348f2be

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build @burglekitt/gmt
        if: inputs.package == 'gmt'
        run: pnpm -w exec nx run @burglekitt/gmt:build

      - name: Build @burglekitt/gmt-oxlint
        if: inputs.package == 'gmt-oxlint'
        run: cd packages/gmt-oxlint && npm run build

      - name: Publish @burglekitt/${{ inputs.package }}
        run: npm publish --access public --tag ${{ inputs.tag }}
        working-directory: packages/${{ inputs.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
