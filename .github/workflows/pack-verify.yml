name: Pack Verify

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
  push:
    branches:
      - main
    paths:
      - 'packages/**'

concurrency:
  group: pack-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  pack-verify:
    name: Pack — verify affected packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Determine affected build projects
        id: affected
        run: |
          AFFECTED=$(pnpm -w exec nx affected --target=build --base=$NX_BASE --head=$NX_HEAD --plain || true)
          echo "affected=$AFFECTED" >> $GITHUB_OUTPUT

      - name: Pack affected projects
        run: |
          affected="${{ steps.affected.outputs.affected }}"
          echo "Affected: $affected"
          for dir in packages/gmt packages/gmt-biome packages/gmt-eslint packages/gmt-oxlint; do
            if [ -f "$dir/package.json" ]; then
              PKG_NAME=$(node -e "console.log(require(process.argv[1]).name)" "$dir/package.json")
              if echo "$affected" | grep -q "$PKG_NAME" || echo "$affected" | grep -q "$(basename $dir)"; then
                echo "Packing $dir ($PKG_NAME)"
                (cd "$dir" && npm pack --dry-run)
              else
                echo "Skipping $dir ($PKG_NAME)"
              fi
            fi
          done
