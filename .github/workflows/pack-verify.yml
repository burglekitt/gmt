name: Pack Verify

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
  push:
    branches:
      - main
    paths:
      - 'packages/**'

concurrency:
  group: pack-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  pack-verify:
    name: Pack — verify affected packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Approve pnpm build scripts
        run: pnpm approve-builds --all

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: nrwl/nx-set-shas@v4

      - name: Determine affected packages
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only $NX_BASE $NX_HEAD)

          # Check each config package; pack if any files changed in that package
          for dir in packages/gmt packages/gmt-biome packages/gmt-eslint packages/gmt-oxlint; do
            if echo "$CHANGED_FILES" | grep -q "^$dir/"; then
              PKG_NAME=$(node -e "console.log(require(process.argv[1]).name)" "$dir/package.json")
              echo "Packing $dir ($PKG_NAME) — files changed"
              (cd "$dir" && npm pack --dry-run)
            else
              PKG_NAME=$(node -e "console.log(require(process.argv[1]).name)" "$dir/package.json")
              echo "Skipping $dir ($PKG_NAME) — no changes"
            fi
          done
